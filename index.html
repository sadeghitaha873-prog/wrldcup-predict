<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> پیش بینی جام جهانی</title>

    <style>
body{        
    font-family:tahoma;
    background:#f4f4f4;
    text-align:center;
}

.box {
    background:white;
    width:400px;
    margin:15Px auto;
    padding:15px;
    border-radius:10px;
    box-shadow: 0 0 10px gray;
 }
 
  input, select, button {
    width:90%;
    padding:10px;
    margin:5px 0;
 }
  
  button {
    background:green;
    color:white;
    border:none;
    cursor:pointer;
 }

  .item {
    background:#eee;
    margin:6px;
    padding:8px;
    border-radius:6px;
    text-align:right;
 }
 </style>
</head>

<body>

    <div class="box">
        <h2>پیش بینی دور دوم مرحله گروهی جام جهانی2026</h2>

        <form action="https://forminit.com/thank-you" method="post">

            <input name="name" placeholder="نام شما" required>

            <select name="match">

                <option>جمهوری چک-آفریقای جنوبی</option>
                <option>مکزیک-کره جنوبی</option>
                <option>کانادا-قطر</option>
                <option>سوئیس-بوسنی و هرزگوین</option>

                <option>آمریکا-استرالیا</option>
                <option>ترکیه-پاراگوئه</option>
                <option>اسکاتلند-مراکش</option> 
                <option>برزیل-هائیتی</option>

                <option>هلند-سوئد</option>
                <option>ژاپن-تونس</option>
                <option>آلمان-ساحل عاج</option>
                <option>اکوادور-کوراسائو</option> 

                <option>عربستان-اسپانیا</option>
                <option>اروگوئه-کیپ ورد</option>
                <option>ایران-بلژیک</option>
                <option>مصر-نیوزلند</option>

                <option>آرژانتین-اتریش</option>
                <option>اردن-الجزایر</option>
                <option>فرانسه-عراق</option>
                <option>نروژ-سنگال</option>

                <option>ازبکستان-پرتقال</option>
                <option>کنگو-کلمبیا</option>
                <option>انگلیس-غنا</option>
                <option>پاناما-کرواسی</option>

            </select>

            <input name="predection" placeholder="مثلا 2-1" required>

            <button type="submit">ثبت پیش بینی</button>

        </form>
    </div>

</body>
</html>
